naftiko: 1.0.0-alpha2
info:
  label: Medium REST API — Users
  description: 'Medium REST API — Users. 1 operations. Lead operation: Get authenticated user. Self-contained Naftiko capability
    covering one Medium business surface.'
  tags:
  - Medium
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MEDIUM_API_KEY: MEDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-users
    baseUri: https://api.medium.com/v1
    description: Medium REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: me
      path: /me
      operations:
      - name: getauthenticateduser
        method: GET
        description: Get authenticated user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MEDIUM_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-users-rest
    port: 8080
    description: REST adapter for Medium REST API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: getauthenticateduser
        description: Get authenticated user
        call: rest-users.getauthenticateduser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Medium REST API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-authenticated-user
      description: Get authenticated user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.getauthenticateduser
      outputParameters:
      - type: object
        mapping: $.
